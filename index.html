<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>喫煙管理 Master</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #f0f4f8; margin: 0; padding: 20px; }
        .container { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 450px; margin: auto; }
        
        #stock-count { font-size: 3.5rem; font-weight: bold; color: #333; margin: 10px 0; }
        .stats-summary { display: flex; justify-content: space-around; background: #f9f9f9; padding: 10px; border-radius: 10px; margin-bottom: 15px; font-size: 0.8rem; }
        .stat-value { display: block; font-size: 1rem; font-weight: bold; color: #e74c3c; }

        .btn-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
        button { border: none; border-radius: 10px; padding: 15px; font-size: 1rem; cursor: pointer; color: white; }
        .btn-minus { background-color: #808080; }
        .btn-plus { background-color: #3498db; }

        /* カレンダー風エリア */
        .calendar-section { margin-top: 20px; text-align: left; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 10px; }
        .day-box { border: 1px solid #eee; height: 45px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.7rem; border-radius: 5px; }
        .day-num { font-weight: bold; color: #999; }
        .day-count { color: #e74c3c; font-weight: bold; }

        .chart-container { margin: 20px 0; height: 200px; }
        .settings { margin-top: 20px; padding-top: 15px; border-top: 1px dashed #ccc; text-align: left; font-size: 0.9rem; }
        input { width: 100%; padding: 8px; margin: 5px 0 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
    </style>

    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link rel="apple-touch-icon"href="icon_192.png>
</head>
<body>

<div class="container">
    <h2>残り本数</h2>
    <div id="stock-count">20</div>

    <div class="stats-summary">
        <div>累計本数<span id="total-sticks" class="stat-value">0</span></div>
        <div>1日平均<span id="avg-sticks" class="stat-value">0</span></div>
        <div>累計総額<span id="total-cost" class="stat-value">0円</span></div>
    </div>

    <div class="btn-group">
        <button class="btn-minus" onclick="consumeOne()">1本消費（−1）</button>
        <button class="btn-plus" onclick="changeStock(20)">1箱追加（＋20）</button>
    </div>

    <div class="calendar-section">
        <h3>今月の記録</h3>
        <div class="calendar-grid" id="calendar"></div>
    </div>

    <div class="chart-container">
        <canvas id="myChart"></canvas>
    </div>

    <div class="settings">
        <label>銘柄 / 1箱価格(円)</label>
        <div style="display:flex; gap:5px;">
            <input type="text" id="brand-name" onchange="saveSettings()">
            <input type="number" id="box-price" onchange="saveSettings()" style="width:100px;">
        </div>
    </div>
</div>

<script>
    let data = {
        stock: 20,
        totalCost: 0,
        brandName: "メビウス",
        boxPrice: 600,
        history: {},      // 銘柄別本数
        dailyLog: {}      // 日付別本数 {"2023-10-27": 5}
    };

    let myChart;

    window.onload = function() {
        const savedData = localStorage.getItem('smoking_app_final');
        if (savedData) {
            data = JSON.parse(savedData);
            document.getElementById('brand-name').value = data.brandName;
            document.getElementById('box-price').value = data.boxPrice;
        }
        initChart();
        updateDisplay();
        renderCalendar();
    };

    function consumeOne() {
    if (data.stock > 0) {
        data.stock -= 1;
        const brand = data.brandName || "未設定";
        
        // ★修正：日本時間で「今日」の日付を取得
        const today = new Date().toLocaleDateString('sv-SE', { timeZone: 'Asia/Tokyo' });
        
        data.history[brand] = (data.history[brand] || 0) + 1;
        data.dailyLog[today] = (data.dailyLog[today] || 0) + 1;
        
        data.totalCost += (data.boxPrice / 20);
        saveAndRefresh();
    } else {
        alert("在庫切れです！");
    }
}

    function changeStock(amount) {
        data.stock += amount;
        saveAndRefresh();
    }

    function saveSettings() {
        data.brandName = document.getElementById('brand-name').value;
        data.boxPrice = parseFloat(document.getElementById('box-price').value) || 0;
        saveAndRefresh();
    }

    function saveAndRefresh() {
        localStorage.setItem('smoking_app_final', JSON.stringify(data));
        updateDisplay();
        updateChart();
        renderCalendar();
    }

    function updateDisplay() {
        document.getElementById('stock-count').innerText = data.stock;
        const total = Object.values(data.history).reduce((a, b) => a + b, 0);
        document.getElementById('total-sticks').innerText = total;
        document.getElementById('total-cost').innerText = Math.floor(data.totalCost) + "円";
        
        // 平均計算
        const daysTracked = Object.keys(data.dailyLog).length || 1;
        document.getElementById('avg-sticks').innerText = (total / daysTracked).toFixed(1);
    }

    function renderCalendar() {
    const calendarEl = document.getElementById('calendar');
    calendarEl.innerHTML = '';
    const now = new Date();
    const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();

    for (let i = 1; i <= daysInMonth; i++) {
        // ★修正：比較用の日付文字列も同じ形式で作成
        const d = new Date(now.getFullYear(), now.getMonth(), i);
        const dateStr = d.toLocaleDateString('sv-SE');
        
        const count = data.dailyLog[dateStr] || 0;
        
        const dayBox = document.createElement('div');
        dayBox.className = 'day-box';
        dayBox.innerHTML = `<span class="day-num">${i}</span><span class="day-count">${count > 0 ? count : ''}</span>`;
        calendarEl.appendChild(dayBox);
    }
}

    function initChart() {
        const ctx = document.getElementById('myChart').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'pie',
            data: {
                labels: Object.keys(data.history),
                datasets: [{
                    data: Object.values(data.history),
                    backgroundColor: ['#3498db', '#e74c3c', '#2ecc71', '#f1c40f', '#9b59b6']
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
        });
    }

    function updateChart() {
        myChart.data.labels = Object.keys(data.history);
        myChart.data.datasets[0].data = Object.values(data.history);
        myChart.update();
    }

    // サービスワーカーの登録
　　  if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
  }
</script>

</body>
</html>
</html>


<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">



</script>
